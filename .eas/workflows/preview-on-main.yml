name: Preview Build (Android)

# main branch'ine her push/merge'de telefonda test için APK üretir
on:
  push:
    branches: ['main']

jobs:
  build_android_preview:
    type: build
    params:
      platform: android
      profile: preview

# Production / iOS build'leri için:
# - Apple Developer hesabı hazır olduğunda ayrı bir workflow ekle:
#   .eas/workflows/release.yml (trigger: tag push "v*")
# - production profile'ına autoSubmit eklenip Play Store + TestFlight'a gönderilir
